name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            libgtest-dev \
            nlohmann-json3-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        # detect_leaks=0: the tests currently leak their DiskManager/BPM/TableHeap.
        # LeakSanitizer is inactive on macOS (where they were written) but active on
        # Linux, so disable it here until those allocations are cleaned up.
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --output-on-failure
