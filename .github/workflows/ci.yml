name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    # Run on macOS so the build uses the same standard library (libc++) as local
    # development. The Linux toolchain (libstdc++) surfaces missing transitive
    # includes that don't occur on macOS.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja googletest nlohmann-json

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
